name: Continuous integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '2 2 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------
  # JOB 1: PR Compliance
  # ------------------------------------------------------------------
  pr-compliance:
    name: Validate PR
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Check PR title
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            const title = context.payload.pull_request.title;
            const validPatterns = [
              /^(feat|fix|docs|style|refactor|perf|test|chore)(\(.+\))?:/,
              /^(Feature|Fix|Docs|Style|Refactor|Performance|Test|Chore):/,
              /^(\d+\.)?\d+\.\d+/,
            ];
            if (!validPatterns.some(pattern => pattern.test(title))) {
              core.warning(`PR title doesn't follow conventional commits: "${title}"`);
            }

      - name: Check PR description
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            const body = context.payload.pull_request.body;
            if (!body || body.trim().length === 0) {
              core.warning('PR description is empty.');
            }

      - name: Check for commits
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            const commits = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            if (commits.data.length === 0) core.setFailed('PR has no commits');

  # ------------------------------------------------------------------
  # JOB 2: Static Analysis (With Enhanced Documentation Logging)
  # ------------------------------------------------------------------
  static-analysis:
    name: Static analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Use Node.js 20.x
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check code formatting
        run: npx prettier --check src/
        continue-on-error: false

      - name: Validate documentation & links
        run: |
          ERRORS=0
          echo "--- Checking Markdown Syntax ---"
          # Loop through markdown files
          for file in *.md; do
            if [ -f "$file" ]; then
              # 'grep -o' gets every match; 'wc -l' counts them. 
              # This prevents exit code 1 when matches are 0.
              count=$(grep -o '```' "$file" | wc -l)
              
              if [ $((count % 2)) -ne 0 ]; then
                echo "::error file=$file::Unclosed code block (found $count backticks). Ensure every opening \`\`\` has a closing \`\`\`."
                ERRORS=$((ERRORS + 1))
              else
                echo "[PASS] $file ($count backticks)"
              fi
            fi
          done

          echo "--- Checking Required Files ---"
          for file in README.md QUICKSTART.md CONTRIBUTING.md; do
            if [ ! -f "$file" ]; then
              echo "::error::Required file missing: $file"
              ERRORS=$((ERRORS + 1))
            else
              echo "[PASS] Found $file"
            fi
          done

          if [ $ERRORS -ne 0 ]; then
            echo "Documentation check failed with $ERRORS error(s)."
            exit 1
          fi

  # ------------------------------------------------------------------
  # JOB 3: Security Checks (With Warning Annotations)
  # ------------------------------------------------------------------
  security:
    name: Security & quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Opt-in to CodeQL file coverage on PRs
        run: echo "CODEQL_ACTION_FILE_COVERAGE_ON_PRS=true" >> $GITHUB_ENV

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13
        with:
          languages: javascript
          queries: security-and-quality

      - name: Use Node.js 20.x
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Validate JSON files
        run: |
          for file in $(find src -name "*.json"); do
            node -e "JSON.parse(require('fs').readFileSync('$file', 'utf8'))" || { echo "::error file=$file::Invalid JSON syntax"; exit 1; }
          done

      - name: Check for TODO/FIXME & console
        run: |
          # Use warnings so they appear in the PR 'Files Changed' summary
          CONSOLE_LOGS=$(grep -r "console\." src/ --include="*.js" | grep -v "console.error\|console.warn" || true)
          if [ ! -z "$CONSOLE_LOGS" ]; then
            echo "::warning::Found non-standard console usage (log/info/debug). Consider removing before release."
            echo "$CONSOLE_LOGS"
          fi

          TODOS=$(grep -rE "TODO|FIXME" src/ --include="*.js" || true)
          if [ ! -z "$TODOS" ]; then
            echo "::notice::Source contains TODO or FIXME markers."
          fi

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13
        with:
          category: '/language:javascript'

  # ------------------------------------------------------------------
  # JOB 4: Build & Verify
  # ------------------------------------------------------------------
  build-and-test:
    name: Build & verify
    needs: [static-analysis]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate opcode signatures
        run: node scripts/validate.js

      - name: Build extension
        run: npm run build

      - name: Run tests
        run: npm run test

      - name: Verify build output
        run: |
          if [ ! -f build/extension.js ]; then 
            echo "::error::Build artifact 'build/extension.js' was not created."
            exit 1
          fi
          node -c build/extension.js

      - name: Check extension structure (Regex)
        run: |
          node << 'EOF'
          const fs = require('fs');
          const content = fs.readFileSync('build/extension.js', 'utf8');
          // Check for the full extension header structure as generated by build.js
          const headerPattern = new RegExp(
            [
              '^// Name         :  .+$',
              '^// ID           :  .+$',
              '^// Description  :  .+$',
              '^// By           :  .+$',
              '^// License      :  .+$',
              '^$',
              '^// Version      :  .+$',
              '^$',
              '^// This file was generated by Mint, the new bundling toolchain for custom TurboWarp extensions\.$',
              '^// It is not recommended to edit this file on your own\.$',
              '^// Instead, edit it in this repository: .+$',
              '^$',
            ].join('\n'),
            'm'
          );
          const checks = {
            'Extension header structure': headerPattern,
            'IIFE function': /\(function\s*\(\s*Scratch\s*\)/m,
            'Registration': /Scratch\.extensions\.register/,
          };
          for (const [name, pattern] of Object.entries(checks)) {
            if (!pattern.test(content)) {
              console.error(`::error::Structural check failed: ${name} not found or incorrect in build output.`);
              process.exit(1);
            }
          }
          EOF

      - name: Validate manifest (ID & version)
        run: |
          node -e "
            const m = require('./src/manifest.json');
            let failed = false;
            // Check: ID must start with a letter and contain only letters, numbers, or underscores
            if (!/^[a-zA-Z][a-zA-Z0-9_]*$/.test(m.id)) {
              console.error(`::error file=src/manifest.json::Invalid ID format: "${m.id}". Must start with a letter and contain only letters, numbers, or underscores.`);
              failed = true;
            }
            if (!/^\d+\.\d+\.\d+/.test(m.version)) {
              console.error(\`::error file=src/manifest.json::Invalid version: \"\${m.version}\". Use SemVer (e.g. 1.0.0).\`);
              failed = true;
            }
            if (failed) process.exit(1);
          "

      - name: Upload build artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: extension-${{ matrix.node-version }}
          path: build/extension.js
          retention-days: 7

      - name: Comment PR with build report
        if: github.event_name == 'pull_request' && matrix.node-version == '20.x'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            const fs = require('fs');
            const size = (fs.statSync('build/extension.js').size / 1024).toFixed(2);
            const artifactUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Build report (Node ${{ matrix.node-version }})\n- **Status**: Success\n- **Bundle Size**: ${size} KB\n- **Verification**: Structure & Syntax Valid\n- **Artifact**: [Download artifact](${artifactUrl})`
            });

  # ------------------------------------------------------------------
  # JOB 5: Manifest version bump check
  # ------------------------------------------------------------------
  manifest-version-check:
    name: Check manifest version bump
    needs: [build-and-test]
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Check for src changes without manifest version bump
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            const cp = require('child_process');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = process.env.GITHUB_SHA;
            let before = context.payload.before;
            const after = process.env.GITHUB_SHA;
            // Guard against missing or all-zero before SHA. Try a fetch and fallbacks so git diff won't throw.
            if (!before || /^0+$/.test(before)) {
              core.info('Base SHA missing or zero; attempting git fetch to retrieve base commit');
              try {
                cp.execSync('git fetch origin --no-tags --prune --quiet', { encoding: 'utf8' });
              } catch (e) {
                core.info('git fetch failed (will try fallbacks)');
              }
            }
            let changed;
            try {
              // Prefer explicit range when before is available; otherwise compare against HEAD~1
              const baseRef = before && !/^0+$/.test(before) ? before : `${after}~1`;
              changed = cp.execSync(`git diff --name-only ${baseRef}..${after}`, { encoding: 'utf8' }).trim();
            } catch (e) {
              core.info('git diff failed; attempting fallback to HEAD~1 and then git ls-files');
              try {
                changed = cp.execSync(`git diff --name-only ${after}~1..${after}`, { encoding: 'utf8' }).trim();
              } catch (e2) {
                try {
                  changed = cp.execSync('git ls-files', { encoding: 'utf8' }).trim();
                } catch (e3) {
                  core.info('git ls-files failed; assuming no changed files');
                  changed = '';
                }
              }
            }
            const files = changed ? changed.split(/\r?\n/).filter(Boolean) : [];
            const srcChanged = files.some(f => f.startsWith('src/') && f !== 'src/manifest.json');
            const readManifest = (rev) => {
              try {
                return JSON.parse(cp.execSync(`git show ${rev}:src/manifest.json`, { encoding: 'utf8' }));
              } catch {
                return null;
              }
            };
            // Resolve an effective baseRef (fall back to after~1 when before is missing/zero)
            const baseRef = before && !/^0+$/.test(before) ? before : `${after}~1`;
            const previousVersion = readManifest(baseRef)?.version;
            const currentVersion = readManifest(after)?.version;
            const versionBumped = previousVersion !== currentVersion;
            if (!srcChanged) {
              core.info(`No src/ changes in range ${baseRef}..${after}; nothing to do.`);
              return;
            }
            if (versionBumped) {
              core.info('Manifest version changed in this push; nothing to do.');
              return;
            }
            const title = 'Bug: [mint-auto] src/* changed without manifest version bump';
            const issues = await github.paginate(github.rest.issues.listForRepo, {owner, repo, state: 'open'});
            if (issues.some(i => !i.pull_request && i.title === title)) {
              core.info('An open issue already exists; skipping creation.');
              return;
            }
            const compareUrl = `https://github.com/${owner}/${repo}/compare/${baseRef}...${after}`;
            const commitUrl = `https://github.com/${owner}/${repo}/commit/${sha}`;
            const body = `The pushed commits in range ${baseRef}..${after} updated files under src/ but did not update src/manifest.json version.\n\nCompare: ${compareUrl}\n\nLatest commit: ${commitUrl}\n\nPlease ensure the extension version in src/manifest.json is bumped when publishing changes.`;
            await github.rest.issues.create({owner, repo, title, body, labels: ['ci']});

  # ------------------------------------------------------------------
  # JOB 5: Dependabot Auto-Approve
  # ------------------------------------------------------------------
  dependabot-approve:
    name: Dependabot auto-approve
    # Only run if previous jobs passed AND the actor is dependabot
    needs: [static-analysis, security, build-and-test]
    if: github.event_name == 'pull_request' && github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@ffa630c65fa7e0ecfa0625b5ceda64399aea1b36 # v3.0.0
        with:
          github-token: '${{ secrets.GITHUB_TOKEN }}'

      - name: Approve and enable auto-merge
        # Checks if the update is a major version bump. If it is, we skip auto-approving to allow for manual review.
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        run: |
          set -e
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
